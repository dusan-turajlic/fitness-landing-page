            fields:
              - { label: "Copyright Text", name: "copyright", widget: "string" }
              - { label: "Privacy Policy Link Text", name: "privacy", widget: "string" }
              - { label: "Terms of Service Link Text", name: "terms", widget: "string" }
          - label: "Form Wizard"
            name: "formWizard"
            widget: "object"
            fields:
              - label: "Step 1"
